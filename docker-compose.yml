services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ponto-facil-app
    restart: unless-stopped
    working_dir: /var/www/html/backend
    volumes:
      - ./backend:/var/www/html/backend
    depends_on:
      - mysql
      - redis
    networks:
      - pontofacil

  nginx:
    image: nginx:alpine
    container_name: ponto-facil-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html/backend
      - ./dist:/var/www/html/dist
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - pontofacil

  mysql:
    image: mysql:8
    container_name: ponto-facil-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pontofacil
      MYSQL_USER: pontofacil
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - pontofacil

  redis:
    image: redis:alpine
    container_name: ponto-facil-redis
    restart: unless-stopped
    networks:
      - pontofacil

  node:
    image: node:22-alpine
    container_name: ponto-facil-node
    working_dir: /app
    volumes:
      - .:/app
    profiles:
      - dev
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - pontofacil

networks:
  pontofacil:
    driver: bridge

volumes:
  mysql_data:
